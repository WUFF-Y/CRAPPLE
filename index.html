<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crab Pier</title>
  <style>
    :root {
      --ink: #17212b;
      --paper: #fff9e8;
      --blue: #0f87b5;
      --sea: #0b5f86;
      --gold: #f0b43c;
      --green: #2f8c66;
      --red: #c84d45;
      --panel: rgba(255, 249, 232, .92);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #75c4e8;
    }

    #game {
      position: fixed;
      inset: 0;
    }

    .hud {
      position: fixed;
      inset: 12px;
      display: grid;
      grid-template-columns: minmax(260px, 360px) 1fr minmax(230px, 310px);
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      pointer-events: none;
    }

    .panel {
      pointer-events: auto;
      background: var(--panel);
      border: 2px solid rgba(23, 33, 43, .14);
      border-radius: 8px;
      box-shadow: 0 14px 28px rgba(23, 33, 43, .16);
      backdrop-filter: blur(10px);
    }

    .top-left {
      grid-column: 1;
      grid-row: 1;
      padding: 12px;
    }

    .top-right {
      grid-column: 3;
      grid-row: 1;
      padding: 12px;
      transition: opacity .16s ease, transform .16s ease;
    }

    .top-right.closed {
      display: none;
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
    }

    .bottom-center {
      grid-column: 1 / 4;
      grid-row: 3;
      justify-self: center;
      width: min(820px, calc(100vw - 24px));
      padding: 10px;
    }

    .title-row,
    .stat-row,
    .shop-row,
    .action-row,
    .catch-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .title-row {
      justify-content: space-between;
      margin-bottom: 8px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 20px;
      line-height: 1.1;
    }

    h2 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .badge {
      min-width: 54px;
      padding: 4px 7px;
      border-radius: 6px;
      text-align: center;
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      background: var(--sea);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 7px;
    }

    .stat {
      min-height: 42px;
      padding: 7px;
      border-radius: 6px;
      background: rgba(255, 255, 255, .62);
      border: 1px solid rgba(23, 33, 43, .08);
    }

    .stat small {
      display: block;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      color: rgba(23, 33, 43, .56);
    }

    .stat strong {
      display: block;
      margin-top: 2px;
      font-size: 16px;
      white-space: nowrap;
    }

    .meter {
      width: 100%;
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(23, 33, 43, .16);
    }

    .meter > span {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--gold));
      transition: width .2s ease;
    }

    .shop {
      display: grid;
      gap: 8px;
    }

    .shop-row {
      justify-content: space-between;
      padding: 8px;
      border-radius: 6px;
      background: rgba(255, 255, 255, .62);
      border: 1px solid rgba(23, 33, 43, .08);
    }

    .shop-row div {
      min-width: 0;
    }

    .shop-row strong,
    .shop-row small {
      display: block;
    }

    .shop-row small {
      color: rgba(23, 33, 43, .6);
      font-size: 11px;
    }

    button,
    select {
      min-height: 36px;
      border: 0;
      border-radius: 6px;
      font-weight: 800;
      color: var(--ink);
      background: #fff;
      box-shadow: inset 0 0 0 1px rgba(23, 33, 43, .12);
    }

    button {
      cursor: pointer;
      padding: 0 12px;
      transition: transform .12s ease, filter .12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .45;
      transform: none;
    }

    .primary {
      color: #fff;
      background: var(--blue);
      box-shadow: none;
    }

    .gold {
      background: var(--gold);
      box-shadow: none;
    }

    .danger {
      color: #fff;
      background: var(--red);
      box-shadow: none;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 8px;
    }

    .action-row {
      min-width: 0;
      flex-wrap: wrap;
    }

    .action-row select,
    .action-row button {
      flex: 1 1 136px;
    }

    .message {
      min-height: 24px;
      margin-bottom: 8px;
      font-weight: 800;
      color: #244357;
    }

    .mini {
      display: none;
      gap: 9px;
      align-items: center;
    }

    .mini.active {
      display: grid;
      grid-template-columns: 1fr 120px;
    }

    .mini-track {
      position: relative;
      height: 34px;
      overflow: hidden;
      border-radius: 6px;
      background: linear-gradient(90deg, rgba(200, 77, 69, .22), rgba(47, 140, 102, .28), rgba(200, 77, 69, .22));
      border: 1px solid rgba(23, 33, 43, .14);
    }

    .sweet {
      position: absolute;
      top: 5px;
      bottom: 5px;
      width: 78px;
      border-radius: 5px;
      background: rgba(47, 140, 102, .72);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, .65) inset;
    }

    .marker {
      position: absolute;
      top: 2px;
      width: 8px;
      height: 30px;
      border-radius: 999px;
      background: var(--ink);
      box-shadow: 0 2px 8px rgba(23, 33, 43, .25);
    }

    .catch-log {
      display: grid;
      gap: 5px;
      margin-top: 9px;
      font-size: 12px;
    }

    .catch-row {
      justify-content: space-between;
      padding: 5px 7px;
      border-radius: 5px;
      background: rgba(255, 255, 255, .56);
    }

    .toast {
      position: fixed;
      left: 50%;
      top: 18px;
      max-width: min(520px, calc(100vw - 24px));
      padding: 9px 12px;
      border-radius: 8px;
      background: rgba(23, 33, 43, .88);
      color: #fff;
      font-weight: 800;
      opacity: 0;
      transform: translate(-50%, -12px);
      transition: opacity .2s ease, transform .2s ease;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 820px) {
      .hud {
        inset: 8px;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto 1fr auto;
      }

      .top-left,
      .top-right,
      .bottom-center {
        grid-column: 1;
      }

      .top-left {
        grid-row: 1;
      }

      .top-right {
        grid-row: 2;
      }

      .bottom-center {
        grid-row: 4;
      }

      .top-right {
        max-height: 170px;
        overflow: auto;
      }

      h1 {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <section class="panel top-left">
      <div class="title-row">
        <h1>Crab Pier</h1>
        <span class="badge" id="level">LV 1</span>
      </div>
      <div class="stat-grid">
        <div class="stat"><small>Coins</small><strong id="coins">80</strong></div>
        <div class="stat"><small>XP</small><strong id="xpText">0 / 100</strong></div>
        <div class="stat"><small>Rod</small><strong id="rodName">Driftwood Rod</strong></div>
        <div class="stat"><small>Bait</small><strong id="baitName">Fish Scraps</strong></div>
      </div>
      <div class="meter" style="margin-top:8px"><span id="xpBar"></span></div>
    </section>

    <section class="panel top-right">
      <div class="title-row">
        <h2>Beach Dock Shop</h2>
        <button class="gold" id="restock">Restock</button>
      </div>
      <div class="shop" id="shop"></div>
    </section>

    <section class="panel bottom-center">
      <div class="message" id="message">The tide is moving. Ready your crab catcher at the end of the dock.</div>
      <div class="controls">
        <div class="action-row">
          <select id="rodSelect" aria-label="Rod"></select>
          <select id="baitSelect" aria-label="Bait"></select>
          <button class="primary" id="cast">Cast Trap</button>
        </div>
        <button id="camera">Turn</button>
        <button id="walk">Walk</button>
      </div>
      <div class="mini" id="mini">
        <div class="mini-track" id="miniTrack">
          <div class="sweet" id="sweet"></div>
          <div class="marker" id="marker"></div>
        </div>
        <button class="danger" id="reel">Reel</button>
      </div>
      <div class="catch-log" id="catchLog"></div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const canvas = document.querySelector('#game');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x84cdec);
    scene.fog = new THREE.Fog(0x84cdec, 65, 210);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 700);
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const sun = new THREE.DirectionalLight(0xfff2cf, 2.2);
    sun.position.set(-34, 62, 30);
    sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    sun.shadow.camera.left = -85;
    sun.shadow.camera.right = 85;
    sun.shadow.camera.top = 85;
    sun.shadow.camera.bottom = -85;
    scene.add(sun);
    scene.add(new THREE.HemisphereLight(0xdff7ff, 0x4f8b5f, 1.25));

    function makeTexture(base, fleck, count = 900) {
      const texCanvas = document.createElement('canvas');
      texCanvas.width = 256;
      texCanvas.height = 256;
      const ctx = texCanvas.getContext('2d');
      ctx.fillStyle = base;
      ctx.fillRect(0, 0, 256, 256);
      for (let i = 0; i < count; i++) {
        ctx.globalAlpha = .08 + Math.random() * .18;
        ctx.fillStyle = fleck;
        const size = 1 + Math.random() * 3;
        ctx.fillRect(Math.random() * 256, Math.random() * 256, size, size);
      }
      ctx.globalAlpha = 1;
      const texture = new THREE.CanvasTexture(texCanvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    const sandTexture = makeTexture('#dfc47f', '#fff4bd', 1400);
    sandTexture.repeat.set(12, 8);
    const woodTexture = makeTexture('#81502f', '#d19a62', 520);
    woodTexture.repeat.set(2, 8);
    const hillTexture = makeTexture('#53885d', '#9cc277', 700);
    hillTexture.repeat.set(5, 3);
    const roofTexture = makeTexture('#aa4438', '#e17b5c', 420);
    roofTexture.repeat.set(2, 2);

    const mats = {
      sand: new THREE.MeshStandardMaterial({ color: 0xe8cf8e, map: sandTexture, roughness: .98 }),
      water: new THREE.MeshPhysicalMaterial({ color: 0x0c79a7, roughness: .18, metalness: .02, transparent: true, opacity: .78, transmission: .12, clearcoat: .4, depthWrite: false }),
      foam: new THREE.MeshStandardMaterial({ color: 0xd9fbff, roughness: .7, transparent: true, opacity: .7 }),
      wood: new THREE.MeshStandardMaterial({ color: 0x8d5934, map: woodTexture, roughness: .82 }),
      darkWood: new THREE.MeshStandardMaterial({ color: 0x5f351f, map: woodTexture, roughness: .9 }),
      roof: new THREE.MeshStandardMaterial({ color: 0xbd4c3c, map: roofTexture, roughness: .75 }),
      trim: new THREE.MeshStandardMaterial({ color: 0xf7e0a7, roughness: .7 }),
      trap: new THREE.MeshStandardMaterial({ color: 0x2f4450, roughness: .6, metalness: .25 }),
      line: new THREE.LineBasicMaterial({ color: 0xf5f1df }),
      player: new THREE.MeshStandardMaterial({ color: 0x255f85, roughness: .65 }),
      hill: new THREE.MeshStandardMaterial({ color: 0x5d9865, map: hillTexture, roughness: .95 }),
      skin: new THREE.MeshStandardMaterial({ color: 0xd69b6d, roughness: .72 }),
      pants: new THREE.MeshStandardMaterial({ color: 0x32424b, roughness: .8 }),
      boot: new THREE.MeshStandardMaterial({ color: 0x2a211b, roughness: .75 }),
      eye: new THREE.MeshStandardMaterial({ color: 0x1b2028, roughness: .4 }),
      crabCommon: new THREE.MeshStandardMaterial({ color: 0xcd6a43, roughness: .72 }),
      crabRare: new THREE.MeshStandardMaterial({ color: 0xbf3b33, roughness: .65, metalness: .08 }),
      king: new THREE.MeshStandardMaterial({ color: 0xf1a532, roughness: .55, metalness: .15 })
    };

    function mesh(geo, mat, pos, scale = [1, 1, 1], cast = true, receive = true) {
      const item = new THREE.Mesh(geo, mat);
      item.position.set(...pos);
      item.scale.set(...scale);
      item.castShadow = cast;
      item.receiveShadow = receive;
      scene.add(item);
      return item;
    }

    const beach = mesh(new THREE.BoxGeometry(190, 3, 120), mats.sand, [0, -2.5, 26], [1, 1, 1], false, true);
    const water = mesh(new THREE.PlaneGeometry(260, 160, 42, 32), mats.water, [0, -1.34, -84], [1, 1, 1], false, false);
    water.rotation.x = -Math.PI / 2;
    water.renderOrder = -1;

    function addSkyAndHills() {
      const sky = new THREE.Mesh(
        new THREE.SphereGeometry(330, 32, 16),
        new THREE.MeshBasicMaterial({ color: 0x8ed1ef, side: THREE.BackSide })
      );
      sky.position.y = -16;
      scene.add(sky);

      const hillPositions = [
        [-82, 1.5, 80, 42, 17, 20],
        [-38, 2, 88, 54, 23, 22],
        [17, 1.2, 84, 58, 19, 21],
        [70, 1.8, 79, 48, 21, 19]
      ];
      hillPositions.forEach(([x, y, z, w, h, d]) => {
        const hill = mesh(new THREE.SphereGeometry(1, 32, 16), mats.hill, [x, y, z], [w, h, d], false, true);
        hill.rotation.y = Math.random() * .25;
      });

      for (let i = 0; i < 9; i++) {
        const cloud = new THREE.Group();
        const mat = new THREE.MeshBasicMaterial({ color: 0xf4fbff, transparent: true, opacity: .82 });
        for (let p = 0; p < 4; p++) {
          const puff = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 8), mat);
          puff.position.set(p * 2.2, Math.sin(p) * .45, Math.cos(p) * .4);
          puff.scale.set(2.5 + Math.random(), 1 + Math.random() * .55, 1.1 + Math.random() * .5);
          cloud.add(puff);
        }
        cloud.position.set(-130 + i * 32, 42 + Math.sin(i) * 8, 45 - Math.random() * 75);
        scene.add(cloud);
      }
    }

    for (let i = 0; i < 14; i++) {
      const foam = mesh(new THREE.PlaneGeometry(16 + Math.random() * 18, .45), mats.foam, [-90 + i * 14, -.94, -3 + Math.sin(i) * 1.6], [1, 1, 1], false, false);
      foam.rotation.x = -Math.PI / 2;
      foam.rotation.z = Math.random() * .18;
    }

    function addDock() {
      for (let i = 0; i < 18; i++) {
        mesh(new THREE.BoxGeometry(6.4, .55, 2.4), mats.wood, [0, .35, 20 - i * 4.2], [1, 1, 1], true, true);
        if (i % 2 === 0) {
          mesh(new THREE.CylinderGeometry(.28, .36, 5.4, 10), mats.darkWood, [-3.7, -1.7, 20 - i * 4.2], [1, 1, 1], true, true);
          mesh(new THREE.CylinderGeometry(.28, .36, 5.4, 10), mats.darkWood, [3.7, -1.7, 20 - i * 4.2], [1, 1, 1], true, true);
        }
      }
      mesh(new THREE.BoxGeometry(9, .7, 1.1), mats.darkWood, [0, 1.15, -56], [1, 1, 1], true, true);
      mesh(new THREE.BoxGeometry(.55, 2.2, 76), mats.darkWood, [-4.1, 1.85, -17], [1, 1, 1], true, true);
      mesh(new THREE.BoxGeometry(.55, 2.2, 76), mats.darkWood, [4.1, 1.85, -17], [1, 1, 1], true, true);
    }

    function addShop() {
      mesh(new THREE.BoxGeometry(18, 10, 14), mats.trim, [-23, 3.1, 22], [1, 1, 1], true, true);
      const roof = mesh(new THREE.ConeGeometry(14, 7, 4), mats.roof, [-23, 11.5, 22], [1.05, .8, 1.05], true, true);
      roof.rotation.y = Math.PI / 4;
      mesh(new THREE.BoxGeometry(8, 5, .5), new THREE.MeshStandardMaterial({ color: 0x3a8cac, roughness: .35, emissive: 0x12384a, emissiveIntensity: .12 }), [-23, 4.2, 14.75], [1, 1, 1], true, false);
      mesh(new THREE.BoxGeometry(13, 2, 1), mats.darkWood, [-23, 8.9, 14.25], [1, 1, 1], true, true);
      mesh(new THREE.BoxGeometry(14, 1.2, 3.2), mats.darkWood, [-23, 1.1, 13.8], [1, 1, 1], true, true);
      mesh(new THREE.BoxGeometry(3.2, 2.2, 1.4), mats.wood, [-29, 2.2, 13.3], [1, 1, 1], true, true);
      mesh(new THREE.BoxGeometry(3.2, 2.2, 1.4), mats.wood, [-17, 2.2, 13.3], [1, 1, 1], true, true);
      for (let i = 0; i < 4; i++) {
        const rod = mesh(new THREE.CylinderGeometry(.08, .08, 12, 8), mats.darkWood, [-31 + i * 2.2, 5, 12.2], [1, 1, 1], true, false);
        rod.rotation.z = -.34;
      }
      const keeper = new THREE.Group();
      const keeperMat = new THREE.MeshStandardMaterial({ color: 0x2f8c66, roughness: .7 });
      const keeperBody = new THREE.Mesh(new THREE.CapsuleGeometry(.5, 1.1, 8, 14), keeperMat);
      keeperBody.position.y = 2.35;
      const keeperHead = new THREE.Mesh(new THREE.SphereGeometry(.46, 18, 12), mats.skin);
      keeperHead.position.y = 3.38;
      const keeperCap = new THREE.Mesh(new THREE.CylinderGeometry(.6, .6, .16, 18), mats.roof);
      keeperCap.position.y = 3.84;
      const keeperBrim = new THREE.Mesh(new THREE.BoxGeometry(.75, .08, .42), mats.roof);
      keeperBrim.position.set(0, 3.8, -.38);
      const keeperNose = new THREE.Mesh(new THREE.SphereGeometry(.08, 10, 8), mats.skin);
      keeperNose.position.set(0, 3.37, -.46);
      const keeperEyeL = new THREE.Mesh(new THREE.SphereGeometry(.045, 8, 6), mats.eye);
      keeperEyeL.position.set(-.16, 3.48, -.4);
      const keeperEyeR = keeperEyeL.clone();
      keeperEyeR.position.x = .16;
      for (let side of [-1, 1]) {
        const arm = new THREE.Mesh(new THREE.CapsuleGeometry(.12, .85, 6, 8), mats.skin);
        arm.position.set(side * .62, 2.55, -.06);
        arm.rotation.z = side * .28;
        keeper.add(arm);
        const leg = new THREE.Mesh(new THREE.CapsuleGeometry(.14, .85, 6, 8), mats.pants);
        leg.position.set(side * .2, 1.42, .02);
        keeper.add(leg);
        const shoe = new THREE.Mesh(new THREE.BoxGeometry(.34, .16, .48), mats.boot);
        shoe.position.set(side * .2, .9, -.08);
        keeper.add(shoe);
      }
      keeper.add(keeperBody, keeperHead, keeperCap, keeperBrim, keeperNose, keeperEyeL, keeperEyeR);
      keeper.position.set(-23, .15, 12.8);
      keeper.rotation.y = Math.PI;
      keeper.traverse(part => {
        part.castShadow = true;
      });
      scene.add(keeper);
    }

    function addSceneDetails() {
      for (let i = 0; i < 18; i++) {
        const x = -86 + Math.random() * 172;
        const z = 8 + Math.random() * 72;
        const rock = mesh(new THREE.DodecahedronGeometry(.8 + Math.random() * 1.2, 0), new THREE.MeshStandardMaterial({ color: 0xb6a177, roughness: .9 }), [x, -.55, z], [1, .42, 1], true, true);
        rock.rotation.set(Math.random(), Math.random(), Math.random());
      }
      for (let i = 0; i < 7; i++) {
        const trunk = mesh(new THREE.CylinderGeometry(.35, .48, 6, 9), new THREE.MeshStandardMaterial({ color: 0x7b4d2e, roughness: .8 }), [25 + i * 7, 1.1, 32 + Math.sin(i) * 9], [1, 1, 1], true, true);
        trunk.rotation.z = .18;
        const leaves = mesh(new THREE.ConeGeometry(4.2, 7, 8), new THREE.MeshStandardMaterial({ color: 0x3f9a58, roughness: .8 }), [26 + i * 7, 6.5, 32 + Math.sin(i) * 9], [1, 1, 1], true, true);
        leaves.rotation.z = -.25;
      }
    }

    addSkyAndHills();
    addDock();
    addShop();
    addSceneDetails();

    const player = new THREE.Group();
    const body = new THREE.Mesh(new THREE.CapsuleGeometry(.62, 1.45, 8, 16), mats.player);
    body.position.y = 2.25;
    body.castShadow = true;
    player.add(body);
    const head = new THREE.Mesh(new THREE.SphereGeometry(.48, 20, 14), mats.skin);
    head.position.y = 3.38;
    head.castShadow = true;
    player.add(head);
    const nose = new THREE.Mesh(new THREE.SphereGeometry(.08, 10, 8), mats.skin);
    nose.position.set(0, 3.36, -.46);
    nose.castShadow = true;
    player.add(nose);
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(.045, 8, 6), mats.eye);
    eyeL.position.set(-.16, 3.48, -.42);
    const eyeR = eyeL.clone();
    eyeR.position.x = .16;
    player.add(eyeL, eyeR);
    const hat = new THREE.Mesh(new THREE.CylinderGeometry(1.02, 1.02, .18, 24), new THREE.MeshStandardMaterial({ color: 0xf0b43c, roughness: .85 }));
    hat.position.y = 3.78;
    hat.castShadow = true;
    player.add(hat);
    const hatTop = new THREE.Mesh(new THREE.CylinderGeometry(.55, .62, .42, 20), new THREE.MeshStandardMaterial({ color: 0xd8972f, roughness: .85 }));
    hatTop.position.y = 4.02;
    hatTop.castShadow = true;
    player.add(hatTop);
    for (let side of [-1, 1]) {
      const arm = new THREE.Mesh(new THREE.CapsuleGeometry(.13, 1.0, 6, 9), mats.skin);
      arm.position.set(side * .73, 2.42, -.06);
      arm.rotation.z = side * .22;
      arm.castShadow = true;
      player.add(arm);
      const leg = new THREE.Mesh(new THREE.CapsuleGeometry(.17, 1.05, 6, 9), mats.pants);
      leg.position.set(side * .26, 1.32, .02);
      leg.castShadow = true;
      player.add(leg);
      const boot = new THREE.Mesh(new THREE.BoxGeometry(.42, .18, .56), mats.boot);
      boot.position.set(side * .26, .72, -.06);
      boot.castShadow = true;
      player.add(boot);
    }
    const rodHolder = new THREE.Group();
    rodHolder.position.set(.85, 2.65, -.2);
    rodHolder.rotation.set(.55, 0, -.45);
    const rodModel = new THREE.Mesh(new THREE.CylinderGeometry(.045, .075, 5.8, 10), mats.darkWood);
    rodModel.position.y = 2.9;
    rodModel.castShadow = true;
    rodHolder.add(rodModel);
    player.add(rodHolder);
    player.position.set(0, .45, 11);
    scene.add(player);

    const trapGroup = new THREE.Group();
    const trapBox = new THREE.Mesh(new THREE.BoxGeometry(1.4, .65, 1.4), mats.trap);
    const trapRing = new THREE.Mesh(new THREE.TorusGeometry(.75, .04, 8, 24), mats.trap);
    trapRing.rotation.x = Math.PI / 2;
    trapBox.castShadow = true;
    trapGroup.add(trapBox, trapRing);
    trapGroup.position.set(0, -8, -40);
    trapGroup.visible = false;
    scene.add(trapGroup);

    const lineGeom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
    const trapLine = new THREE.Line(lineGeom, mats.line);
    trapLine.visible = false;
    scene.add(trapLine);

    const crabGroup = new THREE.Group();
    scene.add(crabGroup);

    const rods = [
      { name: 'Driftwood Rod', cost: 0, power: 1, unlock: 1 },
      { name: 'Pier Rod', cost: 220, power: 1.35, unlock: 8 },
      { name: 'Tidecaller Rod', cost: 1200, power: 1.8, unlock: 32 },
      { name: 'Stormglass Rod', cost: 8400, power: 2.35, unlock: 115 },
      { name: 'Leviathan Rod', cost: 72000, power: 3.2, unlock: 300 },
      { name: 'Crownline Rod', cost: 390000, power: 4.4, unlock: 560 }
    ];

    const baits = [
      { name: 'Fish Scraps', cost: 0, luck: 1, stock: Infinity },
      { name: 'Clam Mash', cost: 25, luck: 1.25, stock: 5 },
      { name: 'Glow Shrimp', cost: 120, luck: 1.7, stock: 3 },
      { name: 'Royal Sardine', cost: 650, luck: 2.3, stock: 1 }
    ];

    const crabTypes = [
      { name: 'Fiddler Crab', rarity: 'Common', color: mats.crabCommon, base: 55, xp: 18, weight: 52 },
      { name: 'Blue Crab', rarity: 'Uncommon', color: new THREE.MeshStandardMaterial({ color: 0x4779b5, roughness: .62 }), base: 105, xp: 34, weight: 26 },
      { name: 'Spider Crab', rarity: 'Rare', color: mats.crabRare, base: 260, xp: 82, weight: 13 },
      { name: 'Ghost Crab', rarity: 'Epic', color: new THREE.MeshStandardMaterial({ color: 0xe9e4d2, roughness: .35, metalness: .05 }), base: 820, xp: 210, weight: 6 },
      { name: 'King Crab', rarity: 'Legendary', color: mats.king, base: 4800, xp: 1200, weight: 1 }
    ];

    const state = {
      coins: 80,
      level: 1,
      xp: 0,
      rod: 0,
      ownedRods: new Set([0]),
      bait: 0,
      baitStock: [Infinity, 0, 0, 0],
      mode: 'idle',
      hook: null,
      miniValue: 0,
      miniDir: 1,
      sweet: 45,
      camMode: 0,
      cameraYaw: 0,
      cameraPitch: .42,
      cameraDistance: 24,
      walking: false,
      nearShop: false,
      pointerDown: false,
      log: []
    };

    const el = {
      level: document.querySelector('#level'),
      coins: document.querySelector('#coins'),
      xpText: document.querySelector('#xpText'),
      xpBar: document.querySelector('#xpBar'),
      rodName: document.querySelector('#rodName'),
      baitName: document.querySelector('#baitName'),
      rodSelect: document.querySelector('#rodSelect'),
      baitSelect: document.querySelector('#baitSelect'),
      cast: document.querySelector('#cast'),
      camera: document.querySelector('#camera'),
      walk: document.querySelector('#walk'),
      shopPanel: document.querySelector('.top-right'),
      shop: document.querySelector('#shop'),
      message: document.querySelector('#message'),
      mini: document.querySelector('#mini'),
      sweet: document.querySelector('#sweet'),
      marker: document.querySelector('#marker'),
      reel: document.querySelector('#reel'),
      catchLog: document.querySelector('#catchLog'),
      toast: document.querySelector('#toast'),
      restock: document.querySelector('#restock')
    };

    function xpNeeded(level) {
      return Math.floor(95 + level * 28 + Math.pow(level, 1.52) * 9);
    }

    function money(n) {
      return Math.floor(n).toLocaleString();
    }

    function showToast(text) {
      el.toast.textContent = text;
      el.toast.classList.add('show');
      clearTimeout(showToast.t);
      showToast.t = setTimeout(() => el.toast.classList.remove('show'), 1800);
    }

    function rebuildSelectors() {
      el.rodSelect.innerHTML = '';
      rods.forEach((rod, i) => {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = state.ownedRods.has(i) ? rod.name : `${rod.name} - LV ${rod.unlock}`;
        option.disabled = !state.ownedRods.has(i);
        el.rodSelect.append(option);
      });
      el.rodSelect.value = state.rod;

      el.baitSelect.innerHTML = '';
      baits.forEach((bait, i) => {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = i === 0 ? bait.name : `${bait.name} x${state.baitStock[i]}`;
        option.disabled = i > 0 && state.baitStock[i] <= 0;
        el.baitSelect.append(option);
      });
      if (state.bait > 0 && state.baitStock[state.bait] <= 0) state.bait = 0;
      el.baitSelect.value = state.bait;
    }

    function rebuildShop() {
      el.shop.innerHTML = '';
      rods.forEach((rod, i) => {
        if (i === 0 || state.ownedRods.has(i)) return;
        const row = document.createElement('div');
        row.className = 'shop-row';
        row.innerHTML = `<div><strong>${rod.name}</strong><small>LV ${rod.unlock} · power ${rod.power.toFixed(2)} · ${money(rod.cost)} coins</small></div>`;
        const buy = document.createElement('button');
        buy.textContent = !state.nearShop ? 'Visit' : state.level < rod.unlock ? 'Locked' : 'Buy';
        buy.disabled = !state.nearShop || state.level < rod.unlock || state.coins < rod.cost;
        buy.onclick = () => {
          if (!state.nearShop) return;
          state.coins -= rod.cost;
          state.ownedRods.add(i);
          state.rod = i;
          showToast(`${rod.name} added to your rack`);
          updateUI();
        };
        row.append(buy);
        el.shop.append(row);
      });

      baits.forEach((bait, i) => {
        if (i === 0) return;
        const row = document.createElement('div');
        row.className = 'shop-row';
        row.innerHTML = `<div><strong>${bait.name}</strong><small>luck ${bait.luck.toFixed(2)} · pack of ${bait.stock} · ${money(bait.cost)} coins</small></div>`;
        const buy = document.createElement('button');
        buy.textContent = state.nearShop ? 'Buy' : 'Visit';
        buy.disabled = !state.nearShop || state.coins < bait.cost;
        buy.onclick = () => {
          if (!state.nearShop) return;
          state.coins -= bait.cost;
          state.baitStock[i] += bait.stock;
          state.bait = i;
          showToast(`${bait.name} stocked`);
          updateUI();
        };
        row.append(buy);
        el.shop.append(row);
      });
    }

    function updateLog() {
      el.catchLog.innerHTML = '';
      state.log.slice(0, 4).forEach(item => {
        const row = document.createElement('div');
        row.className = 'catch-row';
        row.innerHTML = `<span>${item.name}</span><strong>${money(item.value)}c · ${item.rarity}</strong>`;
        el.catchLog.append(row);
      });
    }

    function isNearShop() {
      return player.position.distanceTo(new THREE.Vector3(-23, player.position.y, 22)) < 17;
    }

    function updateShopAccess(force = false) {
      const near = isNearShop();
      if (near === state.nearShop && !force) return;
      state.nearShop = near;
      if (near) {
        el.message.textContent = 'Beach Dock Shop is open.';
      } else if (el.message.textContent === 'Beach Dock Shop is open.') {
        el.message.textContent = 'Walk to the beach shop to buy rods, bait, or restocks.';
      }
      updateUI();
    }

    function updateUI() {
      const need = xpNeeded(state.level);
      el.level.textContent = `LV ${state.level}`;
      el.coins.textContent = money(state.coins);
      el.xpText.textContent = state.level >= 700 ? 'MAX' : `${money(state.xp)} / ${money(need)}`;
      el.xpBar.style.width = state.level >= 700 ? '100%' : `${Math.min(100, state.xp / need * 100)}%`;
      el.rodName.textContent = rods[state.rod].name;
      el.baitName.textContent = baits[state.bait].name;
      el.cast.disabled = state.mode !== 'idle';
      el.shopPanel.classList.toggle('closed', !state.nearShop);
      el.restock.disabled = !state.nearShop;
      el.mini.classList.toggle('active', state.mode === 'minigame');
      rebuildSelectors();
      rebuildShop();
      updateLog();
    }

    function weightedCrab() {
      const rod = rods[state.rod];
      const bait = baits[state.bait];
      const luck = bait.luck + (rod.power - 1) * .48 + Math.min(state.level, 700) / 900;
      const weights = crabTypes.map((crab, i) => crab.weight * Math.pow(luck, i * .72));
      const total = weights.reduce((a, b) => a + b, 0);
      let roll = Math.random() * total;
      for (let i = 0; i < crabTypes.length; i++) {
        roll -= weights[i];
        if (roll <= 0) return crabTypes[i];
      }
      return crabTypes[0];
    }

    function clearCrab() {
      while (crabGroup.children.length) crabGroup.remove(crabGroup.children[0]);
    }

    function makeCrab(type, scale) {
      clearCrab();
      const shell = new THREE.Mesh(new THREE.SphereGeometry(1.2, 24, 14), type.color);
      shell.scale.set(1.35 * scale, .42 * scale, .9 * scale);
      shell.castShadow = true;
      crabGroup.add(shell);
      for (let side of [-1, 1]) {
        const claw = new THREE.Mesh(new THREE.SphereGeometry(.45, 16, 10), type.color);
        claw.scale.set(.72 * scale, .38 * scale, .5 * scale);
        claw.position.set(side * 1.95 * scale, .05, -.18 * scale);
        claw.castShadow = true;
        crabGroup.add(claw);
        for (let i = 0; i < 4; i++) {
          const leg = new THREE.Mesh(new THREE.CylinderGeometry(.07 * scale, .07 * scale, 1.4 * scale, 8), type.color);
          leg.position.set(side * (1 + i * .24) * scale, -.18 * scale, (.72 - i * .36) * scale);
          leg.rotation.z = side * 1.08;
          leg.rotation.x = .3;
          leg.castShadow = true;
          crabGroup.add(leg);
        }
      }
      crabGroup.position.copy(trapGroup.position);
      crabGroup.position.y += .8 * scale;
      crabGroup.visible = true;
    }

    function castTrap() {
      if (state.mode !== 'idle') return;
      state.mode = 'casting';
      state.hook = weightedCrab();
      if (state.bait > 0) {
        state.baitStock[state.bait] -= 1;
      }
      const targetZ = -43 - Math.random() * 24;
      const targetX = -8 + Math.random() * 16;
      trapGroup.position.set(targetX, -1.9, targetZ);
      trapGroup.visible = true;
      trapLine.visible = true;
      clearCrab();
      el.message.textContent = 'Trap splashed down. Something is circling it...';
      updateUI();
      setTimeout(() => {
        if (state.mode !== 'casting') return;
        const difficulty = Math.max(18, 34 - crabTypes.indexOf(state.hook) * 4 - rods[state.rod].power * 2);
        state.sweet = 18 + Math.random() * (82 - difficulty);
        state.miniValue = Math.random() * 100;
        state.miniDir = Math.random() > .5 ? 1 : -1;
        state.mode = 'minigame';
        makeCrab(state.hook, 1 + crabTypes.indexOf(state.hook) * .14);
        el.message.textContent = `${state.hook.rarity} pull on the line: ${state.hook.name}`;
        updateUI();
      }, 1300 + Math.random() * 900);
    }

    function reel() {
      if (state.mode !== 'minigame') return;
      const crab = state.hook;
      const crabIndex = crabTypes.indexOf(crab);
      const rod = rods[state.rod];
      const tolerance = Math.max(9, 21 - crabIndex * 2 + rod.power * 2);
      const center = state.sweet + 17;
      const hit = Math.abs(state.miniValue - center) <= tolerance;
      if (!hit) {
        state.mode = 'idle';
        el.message.textContent = `${crab.name} broke loose under the dock.`;
        trapGroup.position.y = -8;
        trapGroup.visible = false;
        trapLine.visible = false;
        clearCrab();
        updateUI();
        return;
      }
      const size = .7 + Math.random() * (1.1 + crabIndex * .24);
      const value = Math.floor(crab.base * size * (1 + state.level / 1100));
      const xp = Math.floor(crab.xp * size * rod.power);
      state.coins += value;
      grantXP(xp);
      state.log.unshift({ name: crab.name, value, rarity: crab.rarity });
      state.log = state.log.slice(0, 8);
      state.mode = 'idle';
      trapGroup.position.y = -8;
      trapGroup.visible = false;
      trapLine.visible = false;
      crabGroup.position.set(-2 + Math.random() * 4, 1.25, -53);
      el.message.textContent = `Landed ${crab.name}: ${money(value)} coins and ${money(xp)} XP.`;
      showToast(crab.name === 'King Crab' ? 'King Crab landed!' : `${crab.rarity} catch`);
      updateUI();
    }

    function grantXP(amount) {
      if (state.level >= 700) return;
      state.xp += amount;
      while (state.level < 700 && state.xp >= xpNeeded(state.level)) {
        state.xp -= xpNeeded(state.level);
        state.level += 1;
        showToast(`Level ${state.level}`);
      }
      if (state.level >= 700) state.xp = 0;
    }

    el.cast.addEventListener('click', castTrap);
    el.reel.addEventListener('click', reel);
    el.rodSelect.addEventListener('change', e => {
      state.rod = Number(e.target.value);
      updateUI();
    });
    el.baitSelect.addEventListener('change', e => {
      state.bait = Number(e.target.value);
      updateUI();
    });
    el.camera.addEventListener('click', () => {
      setCameraYaw(-Math.PI / 4);
    });
    el.walk.addEventListener('click', () => {
      state.walking = !state.walking;
      el.walk.textContent = state.walking ? 'Stop' : 'Walk';
    });
    el.restock.addEventListener('click', () => {
      if (!state.nearShop) {
        showToast('Walk up to the beach shop first');
        return;
      }
      const cost = 45 + Math.floor(state.level * 1.8);
      if (state.coins < cost) {
        showToast(`${money(cost)} coins needed`);
        return;
      }
      state.coins -= cost;
      for (let i = 1; i < baits.length; i++) state.baitStock[i] += Math.ceil(baits[i].stock / 2);
      showToast('Bait bins refreshed');
      updateUI();
    });

    function setCameraYaw(delta) {
      state.cameraYaw += delta;
    }

    canvas.addEventListener('pointerdown', e => {
      state.pointerDown = true;
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointerup', e => {
      state.pointerDown = false;
      canvas.releasePointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointercancel', () => {
      state.pointerDown = false;
    });
    canvas.addEventListener('pointermove', e => {
      if (!state.pointerDown) return;
      state.cameraYaw -= e.movementX * .006;
      state.cameraPitch = THREE.MathUtils.clamp(state.cameraPitch + e.movementY * .003, .22, .9);
    });
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      state.cameraDistance = THREE.MathUtils.clamp(state.cameraDistance + e.deltaY * .018, 14, 38);
    }, { passive: false });

    const keys = new Set();
    addEventListener('keydown', e => {
      keys.add(e.key.toLowerCase());
      if (e.key.toLowerCase() === 'q') setCameraYaw(.12);
      if (e.key.toLowerCase() === 'e') setCameraYaw(-.12);
      if (e.key === ' ') {
        e.preventDefault();
        state.mode === 'minigame' ? reel() : castTrap();
      }
    });
    addEventListener('keyup', e => keys.delete(e.key.toLowerCase()));

    function updatePlayer(dt) {
      const moveSpeed = 13 * dt;
      let forward = 0;
      let strafe = 0;
      if (keys.has('w') || keys.has('arrowup') || state.walking) forward += 1;
      if (keys.has('s') || keys.has('arrowdown')) forward -= 1;
      if (keys.has('a') || keys.has('arrowleft')) strafe -= 1;
      if (keys.has('d') || keys.has('arrowright')) strafe += 1;
      const inputLength = Math.hypot(forward, strafe);
      if (inputLength > 0) {
        forward /= inputLength;
        strafe /= inputLength;
        const yaw = state.cameraYaw;
        const forwardVec = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
        const rightVec = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
        const move = forwardVec.multiplyScalar(forward).add(rightVec.multiplyScalar(strafe)).multiplyScalar(moveSpeed);
        const nextX = player.position.x + move.x;
        const nextZ = player.position.z + move.z;
        const onDockOrWaterEdge = nextZ < 4 && Math.abs(nextX) <= 4.2 && nextZ > -58;
        const onBeach = nextZ >= -2 && nextZ <= 76 && nextX >= -88 && nextX <= 88;
        const blockedByShop = nextX > -33.5 && nextX < -12.5 && nextZ > 13 && nextZ < 31;
        if ((onDockOrWaterEdge || onBeach) && !blockedByShop) {
          player.position.x = nextX;
          player.position.z = nextZ;
          player.rotation.y = Math.atan2(move.x, move.z);
        }
      }
      updateShopAccess();
    }

    function updateLine() {
      if (!trapLine.visible) return;
      const tip = new THREE.Vector3(1.3, 3.4, -4.8).applyMatrix4(player.matrixWorld);
      const end = trapGroup.position.clone();
      end.y += .55;
      lineGeom.setFromPoints([tip, end]);
    }

    function updateCamera(t) {
      const yaw = state.cameraYaw + state.camMode * Math.PI * .5;
      const distance = state.camMode === 1 ? state.cameraDistance * 1.25 : state.cameraDistance;
      const height = Math.sin(state.cameraPitch) * distance;
      const flat = Math.cos(state.cameraPitch) * distance;
      const target = new THREE.Vector3(
        player.position.x + Math.sin(yaw) * flat,
        player.position.y + 3.2 + height,
        player.position.z + Math.cos(yaw) * flat
      );
      camera.position.lerp(target, .045);
      camera.lookAt(player.position.x, 2.1, player.position.z);
      camera.position.y += Math.sin(t * .001) * .006;
    }

    let last = performance.now();
    let frameTick = 0;
    function animate(now) {
      requestAnimationFrame(animate);
      const dt = Math.min(.04, (now - last) / 1000);
      last = now;
      updatePlayer(dt);
      updateLine();
      updateCamera(now);
      frameTick += 1;
      if (frameTick % 2 === 0) {
        const positions = water.geometry.attributes.position;
        for (let i = 0; i < positions.count; i++) {
          const x = positions.getX(i);
          const y = positions.getY(i);
          positions.setZ(i, Math.sin(x * .06 + now * .00075) * .12 + Math.cos(y * .05 + now * .00055) * .1);
        }
        positions.needsUpdate = true;
      }
      if (frameTick % 16 === 0) water.geometry.computeVertexNormals();
      player.position.y = .45 + Math.sin(now * .004) * .025;
      rodHolder.rotation.x = .55 + Math.sin(now * .003) * .035;
      trapGroup.rotation.y += dt * (state.mode === 'idle' ? .4 : 1.8);
      trapGroup.position.y += state.mode !== 'idle' ? Math.sin(now * .004) * .003 : 0;
      if (state.mode === 'minigame') {
        const speed = 65 + crabTypes.indexOf(state.hook) * 18;
        state.miniValue += state.miniDir * speed * dt;
        if (state.miniValue > 100) {
          state.miniValue = 100;
          state.miniDir = -1;
        }
        if (state.miniValue < 0) {
          state.miniValue = 0;
          state.miniDir = 1;
        }
        el.sweet.style.left = `${state.sweet}%`;
        el.marker.style.left = `calc(${state.miniValue}% - 4px)`;
        crabGroup.rotation.y = Math.sin(now * .006) * .35;
      }
      renderer.render(scene, camera);
    }

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    updateUI();
    camera.position.set(12, 14, 35);
    animate(performance.now());
  </script>
</body>
</html>
